<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Friends Wishes 🎥</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: #333;
}

/* Container */
.container {
  padding: 20px;
}

h1 {
  margin-top: 20px;
}

/* 🎬 Fixed Medium Video */
.video-container {
  width: 700px;   /* medium width */
  height: 480px;  /* medium height */
  margin: 30px auto;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* Video */
.video-container video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Button */
button {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 18px;
  background: #ff4b7d;
  border: none;
  border-radius: 25px;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">
  <h1>💖 Special Wishes From Your Friends 💖</h1>

  <div class="video-container">
    <video controls autoplay>
      <source src="friends.mp4" type="video/mp4">
    </video>
  </div>
</div>

<script>
function goBack() {
  if (document.referrer !== "") {
    window.history.back();
  } else {
    window.location.href = "index.html";
  }
}
</script>

</body>
</html>
